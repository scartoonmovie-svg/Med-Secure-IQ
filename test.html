<!DOCTYPE html>
<html>
<head>
    <title>MediGuard AI Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.2.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
</head>
<body>
    <h1>Testing JavaScript Modules</h1>
    <div id="results"></div>
    
    <script src="js/encryption.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/medical-ai.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        const results = document.getElementById('results');
        
        try {
            // Test EncryptionService
            const encryption = new EncryptionService();
            results.innerHTML += '<p>✅ EncryptionService loaded</p>';
            
            // Test StorageManager
            const storage = new StorageManager();
            results.innerHTML += '<p>✅ StorageManager loaded</p>';
            
            // Test MedicalAIAgent
            const ai = new MedicalAIAgent();
            results.innerHTML += '<p>✅ MedicalAIAgent loaded</p>';
            
            // Test MediGuardApp
            const app = new MediGuardApp();
            results.innerHTML += '<p>✅ MediGuardApp loaded</p>';
            
            results.innerHTML += '<h2>All modules loaded successfully!</h2>';
        } catch (error) {
            results.innerHTML += '<p style="color: red;">❌ Error: ' + error.message + '</p>';
            console.error(error);
        }
    </script>
</body>
</html>
